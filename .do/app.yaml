name: strategy-filings
region: nyc

services:
  - name: backend
    source_dir: .
    dockerfile_path: backend/Dockerfile
    http_port: 8000
    instance_count: 1
    instance_size_slug: basic-xs
    envs:
      - key: LANDING_AI_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: ANTHROPIC_API_KEY
        scope: RUN_TIME
        type: SECRET
    volumes:
      - key: data
        mount_path: /data
        size_bytes: 5368709120

static_sites:
  - name: frontend
    source_dir: frontend
    build_command: npm run build
    output_dir: dist
    catchall_document: index.html
    envs:
      - key: VITE_API_URL
        scope: BUILD_TIME
        value: ${backend.PUBLIC_URL}
