name: oyster-app
region: nyc

features:
- buildpack-stack=ubuntu-22

alerts:
- rule: DEPLOYMENT_FAILED
- rule: DOMAIN_FAILED

services:
- name: document-query-tool-do
  dockerfile_path: /Dockerfile
  source_dir: /
  github:
    branch: main
    deploy_on_push: true
    repo: SigmaAIAnalytics/Document-Query-Tool-DO
  http_port: 8000
  instance_count: 1
  instance_size_slug: apps-s-1vcpu-0.5gb
  routes:
  - path: /api
    preserve_path_prefix: false
  envs:
  - key: ANTHROPIC_API_KEY
    scope: RUN_TIME
    type: SECRET
  - key: LANDING_AI_API_KEY
    scope: RUN_TIME
    type: SECRET

static_sites:
- name: frontend
  github:
    branch: main
    deploy_on_push: true
    repo: SigmaAIAnalytics/Document-Query-Tool-DO
  source_dir: frontend
  build_command: npm run build
  output_dir: dist
  catchall_document: index.html
